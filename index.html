<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Newsletter sign-up form with success message</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
   <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Sign-up form start -->
  <div class="main-card">
    <div class="signup-form">
      <div class="signup-form-content">
  <h1 class="form-header">Stay updated!</h1>

  <p class="form-para">Join 60,000+ product managers receiving monthly <br> updates on:</p>
  <ul>
    <li><img src="./assets/images/icon-list.svg" alt="circular orange tickbox" class="list-icons">Product discovery and building what matters</li>
    <li><img src="./assets/images/icon-list.svg" alt="circular orange tickbox" class="list-icons">Measuring to ensure updates are a success</li>
    <li><img src="./assets/images/icon-list.svg" alt="circular orange tickbox" class="list-icons">And much more!</li>
  </ul>
  <form action="success-message.html" method="GET">
  <label for="email">Email Address</label> <br>
   <input type="email" name="email" id="email" placeholder="email@company.com" required> <br>
   <input type="submit" value="Subscribe to monthly newsletter" class="submit-button">
  </form>
  </div>
  <div class="signup-form-pic">
    <img src="./assets/images/illustration-sign-up-desktop.svg" alt="my image" />
  </div>
    </div>
  </div>
  
</body>
</html>
